<!DOCTYPE html>
<html>
<head>
    <title>Calibración ToF Sincronizada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family: sans-serif; padding: 10px;">
    <h2>Herramienta de Calibración ToF</h2>
    
    <!-- Video de la cámara en vivo -->
    <video id="cameraStream" autoplay playsinline style="width: 100%; max-width: 400px; border-radius: 8px;"></video>
    
    <div style="margin-top: 10px; max-width: 400px;">
        <button id="btnConnect" style="padding: 10px; background-color: #007aff; color: white; border: none; border-radius: 5px; width: 48%;">1. Conectar BLE</button>
        <button id="btnCapture" disabled style="padding: 10px; background-color: #666; color: white; border: none; border-radius: 5px; width: 48%; float: right;">2. Capturar Foto</button>
    </div>

    <!-- Contenedor Principal de la Imagen (Oculto al inicio) -->
    <div id="canvasContainer" style="display: none; margin-top: 20px; position: relative;">
        <!-- El canvas procesa los gráficos en segundo plano -->
        <canvas id="mainCanvas" style="display: none;"></canvas>
        
        <p style="font-size: 14px; color: #d9534f; font-weight: bold; margin-bottom: 5px;">Mantén presionada la imagen abajo para guardarla</p>
        <!-- Esta es la imagen interactiva que sí permite ser guardada en iOS -->
        <img id="resultImage" style="width: 100%; max-width: 400px; border: 2px solid #333; border-radius: 8px;" />
    </div>

    <!-- Controles de Calibración Post Captura (Ocultos al inicio) -->
    <div id="calibrationControls" style="display: none; margin-top: 20px; max-width: 400px;">
        <h3 style="color: #007aff;">Modo Calibración</h3>
        <p style="font-size: 14px; color: #555;">Ajusta los controles hasta que el punto con el menor número (en mm) coincida con la punta del objeto fotografiado.</p>
        
        <label>Escala (Zoom): <span id="valScale" style="font-weight: bold;">1.00</span></label><br>
        <input type="range" id="sliderScale" min="0.1" max="3.0" step="0.01" value="1.0" style="width: 100%; margin-bottom: 15px;">
        
        <label>Desplazamiento X: <span id="valX" style="font-weight: bold;">0.000</span></label><br>
        <input type="range" id="sliderX" min="-1" max="1" step="0.005" value="0" style="width: 100%; margin-bottom: 15px;">
        
        <label>Desplazamiento Y: <span id="valY" style="font-weight: bold;">0.000</span></label><br>
        <input type="range" id="sliderY" min="-1" max="1" step="0.005" value="0" style="width: 100%; margin-bottom: 20px;">

        <button id="btnExport" style="padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; width: 100%; font-size: 16px; font-weight: bold;">Exportar Calibración</button>
    </div>

    <script>
        // ----------------------------------------------------
        // VARIABLES GLOBALES Y CONFIGURACIÓN
        // ----------------------------------------------------
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        let lastDepthMatrix = null;
        let frozenImageCanvas = null; // Guardará la foto sin los puntos
        let frozenDepthMatrix = null; // Guardará la matriz congelada en el momento exacto
        
        // Elementos del DOM
        const video = document.getElementById('cameraStream');
        const btnConnect = document.getElementById('btnConnect');
        const btnCapture = document.getElementById('btnCapture');
        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        const sliderScale = document.getElementById('sliderScale');
        const sliderX = document.getElementById('sliderX');
        const sliderY = document.getElementById('sliderY');

        // ----------------------------------------------------
        // 1. INICIAR CÁMARA
        // ----------------------------------------------------
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Error accediendo a la cámara", err));

        // ----------------------------------------------------
        // 2. CONEXIÓN BLUETOOTH
        // ----------------------------------------------------
        btnConnect.addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Volumen_ToF_ESP32' }],
                    optionalServices: [SERVICE_UUID]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(CHAR_UUID);
                
                await characteristic.startNotifications();
                
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const view = event.target.value;
                    let matrix = [];
                    let offset = 0;
                    
                    for(let r = 0; r < 8; r++){
                        let row = [];
                        for(let c = 0; c < 8; c++){
                            row.push(view.getUint16(offset, true)); 
                            offset += 2;
                        }
                        
                        // ROTACIÓN 180° - Paso 1: Invertir el orden de las columnas (espejo horizontal)
                        row.reverse(); 
                        
                        matrix.push(row);
                    }
                    
                    // ROTACIÓN 180° - Paso 2: Invertir el orden de las filas (espejo vertical)
                    matrix.reverse();
                    
                    lastDepthMatrix = matrix; 
                });

                btnCapture.disabled = false;
                btnCapture.style.backgroundColor = "#ff3b30"; // Botón se pone rojo al estar listo
                btnConnect.innerText = "BLE Conectado ✓";
                btnConnect.style.backgroundColor = "#28a745";
            } catch (error) {
                console.error("Error BLE:", error);
                alert("Error conectando al Bluetooth. Revisa los permisos.");
            }
        });

        // ----------------------------------------------------
        // 3. INICIAR EL MODO CALIBRACIÓN (AL CAPTURAR)
        // ----------------------------------------------------
        btnCapture.addEventListener('click', () => {
            if(!lastDepthMatrix) {
                alert("Aún no hay datos del sensor. Asegúrate de encender el ToF.");
                return;
            }

            // Hacer una copia independiente (congelar) de la matriz en este milisegundo
            frozenDepthMatrix = JSON.parse(JSON.stringify(lastDepthMatrix));

            // Congelar la cámara en un canvas de respaldo
            frozenImageCanvas = document.createElement('canvas');
            frozenImageCanvas.width = video.videoWidth;
            frozenImageCanvas.height = video.videoHeight;
            frozenImageCanvas.getContext('2d').drawImage(video, 0, 0);

            // Ajustar el canvas principal a la resolución de la foto
            mainCanvas.width = video.videoWidth;
            mainCanvas.height = video.videoHeight;

            // Ocultar video en vivo y botones iniciales
            video.style.display = 'none';
            btnConnect.style.display = 'none';
            btnCapture.style.display = 'none';
            
            // Mostrar los controles de calibración
            document.getElementById('canvasContainer').style.display = 'block';
            document.getElementById('calibrationControls').style.display = 'block';

            // Dibujar el primer frame con la grilla
            drawCalibration();
        });

        // ----------------------------------------------------
        // 4. MOTOR DE RENDERIZADO INTERACTIVO
        // ----------------------------------------------------
        function drawCalibration() {
            if (!frozenImageCanvas || !frozenDepthMatrix) return; 

            // Leer valores de los sliders
            const scale = parseFloat(sliderScale.value);
            const normX = parseFloat(sliderX.value); 
            const normY = parseFloat(sliderY.value);

            // Actualizar los números en la pantalla
            document.getElementById('valScale').innerText = scale.toFixed(2);
            document.getElementById('valX').innerText = normX.toFixed(3);
            document.getElementById('valY').innerText = normY.toFixed(3);

            // Limpiar canvas y poner la foto de fondo intacta
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            ctx.drawImage(frozenImageCanvas, 0, 0);

            // Calcular transformación geométrica
            const offsetX = normX * mainCanvas.width;
            const offsetY = normY * mainCanvas.height;
            const gridW = mainCanvas.width * scale;
            const gridH = mainCanvas.height * scale;
            const startX = (mainCanvas.width / 2) - (gridW / 2) + offsetX;
            const startY = (mainCanvas.height / 2) - (gridH / 2) + offsetY;
            const cellW = gridW / 8;
            const cellH = gridH / 8;

            // Encontrar distancias min/max para colorear y escalar los círculos
            let minDist = Infinity;
            let maxDist = -Infinity;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const dist = frozenDepthMatrix[r][c];
                    if (dist > 0 && dist < 4000) {
                        if (dist < minDist) minDist = dist;
                        if (dist > maxDist) maxDist = dist;
                    }
                }
            }
            if (minDist === Infinity) { minDist = 1; maxDist = 2; }
            const maxRadius = Math.min(cellW, cellH) / 2.2;
            const minRadius = maxRadius * 0.15;

            // Dibujar la malla de puntos
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const dist = frozenDepthMatrix[r][c];
                    if (dist > 0 && dist < 4000) {
                        const normalized = 1.0 - ((dist - minDist) / (maxDist - minDist));
                        const radius = minRadius + (normalized * (maxRadius - minRadius));
                        
                        const x = startX + c * cellW + cellW / 2;
                        const y = startY + r * cellH + cellH / 2;
                        
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(0, 255, 100, 0.5)';
                        ctx.fill();
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = 'rgba(0, 200, 50, 0.8)';
                        ctx.stroke();
                        
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 16px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.strokeStyle = 'black'; 
                        ctx.lineWidth = 3;
                        ctx.strokeText(dist, x, y);
                        ctx.fillText(dist, x, y);
                    }
                }
            }
            / Pasar el gráfico del canvas oculto a la etiqueta <img> visible
            document.getElementById('resultImage').src = mainCanvas.toDataURL('image/jpeg', 0.9);
        }

        // ----------------------------------------------------
        // 5. ESCUCHAR CAMBIOS EN LOS SLIDERS
        // ----------------------------------------------------
        sliderScale.addEventListener('input', drawCalibration);
        sliderX.addEventListener('input', drawCalibration);
        sliderY.addEventListener('input', drawCalibration);

        // ----------------------------------------------------
        // 6. EXPORTAR LOS PARÁMETROS 
        // ----------------------------------------------------
        document.getElementById('btnExport').addEventListener('click', async () => {
            const calibrationData = {
                timestamp: Date.now(),
                calibration_parameters: {
                    scale: parseFloat(sliderScale.value),
                    offset_x_normalized: parseFloat(sliderX.value),
                    offset_y_normalized: parseFloat(sliderY.value)
                },
                depth_mm: frozenDepthMatrix
            };

            const jsonString = JSON.stringify(calibrationData, null, 2);

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Calibración ToF',
                        text: jsonString
                    });
                } catch (err) {
                    console.log('Usuario canceló o hubo un error al compartir', err);
                }
            } else {
                alert("Copia estos datos:\n\n" + jsonString);
            }
        });
    </script>
</body>
</html>
