<!DOCTYPE html>
<html>
<head>
    <title>Captura ToF Sincronizada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h2>Herramienta de Captura ToF</h2>
    
    <!-- Video de la cámara en vivo -->
    <video id="cameraStream" autoplay playsinline style="width: 100%; max-width: 400px;"></video>
    <br>
    
    <button id="btnConnect">1. Conectar BLE</button>
    <button id="btnCapture" disabled>2. Capturar Foto y Datos</button>

    <div id="outputContainer" style="display: none; margin-top: 20px; font-family: sans-serif;">
        <h3 style="color: green;">¡Captura Exitosa!</h3>
        
        <p><b>1. Foto:</b> Mantén presionada la imagen para "Guardar en Fotos"</p>
        <img id="resultImage" style="width: 100%; max-width: 400px; border: 2px solid #333; border-radius: 8px;" />
        
        <p><b>2. Datos ToF:</b> Copia este texto o presiona compartir</p>
        <textarea id="resultJSON" rows="12" style="width: 100%; max-width: 400px; font-family: monospace;"></textarea>
        <br>
        <button id="btnShare" style="margin-top: 10px; padding: 10px; background-color: #007aff; color: white; border: none; border-radius: 5px;">Compartir Datos (WhatsApp/Mail)</button>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        let lastDepthMatrix = null;
        const video = document.getElementById('cameraStream');
        const btnConnect = document.getElementById('btnConnect');
        const btnCapture = document.getElementById('btnCapture');

        // 1. Iniciar la cámara trasera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Error accediendo a la cámara", err));

        // 2. Conexión Bluetooth
        btnConnect.addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Volumen_ToF_ESP32' }],
                    optionalServices: [SERVICE_UUID]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(CHAR_UUID);
                
                await characteristic.startNotifications();
                
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const view = event.target.value; // DataView con los 128 bytes
                    let matrix = [];
                    let offset = 0;
                    for(let r = 0; r < 8; r++){
                        let row = [];
                        for(let c = 0; c < 8; c++){
                            row.push(view.getUint16(offset, true)); // true = Little Endian
                            offset += 2;
                        }
                        matrix.push(row);
                    }
                    lastDepthMatrix = matrix; // Mantiene el último frame en caché
                });

                btnCapture.disabled = false;
                alert("Sensor ToF Conectado y recibiendo datos!");
            } catch (error) {
                console.error("Error BLE:", error);
            }
        });

        // 3. Captura Sincronizada con Visualización de Profundidad
        btnCapture.addEventListener('click', () => {
            if(!lastDepthMatrix) {
                alert("Aún no hay datos del sensor. Asegúrate de conectar el Bluetooth primero.");
                return;
            }

            // 3.1 Preparar el Canvas con las dimensiones del video
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            // 3.2 Dibujar la foto original como fondo
            ctx.drawImage(video, 0, 0);

            // 3.3 Encontrar la distancia mínima y máxima para escalar el tamaño de los puntos
            let minDist = Infinity;
            let maxDist = -Infinity;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const dist = lastDepthMatrix[r][c];
                    if (dist > 0 && dist < 4000) { // Ignorar 0s o valores de error gigante
                        if (dist < minDist) minDist = dist;
                        if (dist > maxDist) maxDist = dist;
                    }
                }
            }
            // Fallback por si la matriz está vacía o defectuosa
            if (minDist === Infinity) { minDist = 1; maxDist = 2; } 

            // 3.4 Calcular dimensiones de la grilla para superponerla en toda la imagen
            const cellW = canvas.width / 8;
            const cellH = canvas.height / 8;
            // El radio máximo será un poco menos que la mitad de la celda para que no choquen
            const maxRadius = Math.min(cellW, cellH) / 2.2; 
            const minRadius = maxRadius * 0.15; // Radio mínimo para puntos lejanos

            // 3.5 Dibujar los 64 puntos
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const dist = lastDepthMatrix[r][c];
                    
                    if (dist > 0 && dist < 4000) {
                        // Normalizar (0.0 = más lejos, 1.0 = más cerca)
                        const normalized = 1.0 - ((dist - minDist) / (maxDist - minDist));
                        // Calcular radio proporcional
                        const radius = minRadius + (normalized * (maxRadius - minRadius));
                        
                        // Coordenadas centrales de esta celda
                        const x = c * cellW + cellW / 2;
                        const y = r * cellH + cellH / 2;
                        
                        // Dibujar el círculo (verde semi-transparente)
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(0, 255, 100, 0.5)';
                        ctx.fill();
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = 'rgba(0, 200, 50, 0.8)';
                        ctx.stroke();
                        
                        // Escribir la distancia en mm sobre el círculo
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 16px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        // Borde negro para que el texto sea legible siempre
                        ctx.strokeStyle = 'black'; 
                        ctx.lineWidth = 3;
                        ctx.strokeText(dist, x, y);
                        ctx.fillText(dist, x, y);
                    }
                }
            }

            // 3.6 Mostrar la imagen final (Foto + Grilla) en la pantalla
            document.getElementById('resultImage').src = canvas.toDataURL('image/jpeg', 0.9);

            // 3.7 Formatear y mostrar el JSON
            const syncedData = JSON.stringify({
                timestamp: Date.now(),
                sensor: "VL53L5CX",
                resolution: [8, 8],
                depth_mm: lastDepthMatrix
            }, null, 2);
            document.getElementById('resultJSON').value = syncedData;
            document.getElementById('outputContainer').style.display = 'block';
        });
        
        // 4. Lógica del botón compartir nativo de iOS
        document.getElementById('btnShare').addEventListener('click', async () => {
            const jsonData = document.getElementById('resultJSON').value;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Datos ToF Sincronizados',
                        text: jsonData
                    });
                } catch (err) {
                    console.log('Error al compartir o usuario canceló', err);
                }
            } else {
                alert("La función de compartir no está soportada. Por favor, selecciona el texto y cópialo manualmente.");
            }
        });
    </script>
</body>
</html>
